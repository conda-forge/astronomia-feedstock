{% set name = "astronomia" %}
{% set version = "3.0.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/astronomia-{{ version }}.tar.gz
  sha256: c6bb28769848bb2f20b1eb92654c440b673dec69db90458386fdc9264840b990

build:
  entry_points:
    - solstice = astronomia.apps.solstice:main
    - check_perihelion = astronomia.apps.check_perihelion:main
    - cronus = astronomia.apps.cronus:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=45
    - setuptools-scm >=6.2
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - cltoolbox
    - dateparser
    - matplotlib-base >=3.3.2
    - numpy
    - odfpy >=1.4.1
    - openpyxl >=3.0.7
    - pandas
    - pint !=0.21
    - pint-pandas
    - pydantic
    - pytables >=3.6.1
    - pyxlsb >=1.0.8
    - scipy
    - tabulate
    - typing-extensions
    - xlrd >=2.0.1
    - xlsxwriter
    - python-calamine

test:
  imports:
    - astronomia
  commands:
    - pip check
    - solstice --help
    - check_perihelion --help
    - cronus --help
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: Library for calculation of ephemeris and other astronomical calculations
  license: GPL-2.0-or-later
  license_file: LICENSE.txt
  home: https://timcera.bitbucket.io/astronomia/docs/index.html

extra:
  recipe-maintainers:
    - timcera
